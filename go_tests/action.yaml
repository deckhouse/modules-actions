name: "Go tests"
description: "Go tests"

env:
  GO_BUILD_TAGS: "ce ee se seplus csepro"

runs:
  using: "composite"
  steps:
    - name: Setup Go environment
      uses: actions/setup-go@v5
      with:
        go-version: "1.25"

    - name: Run Go tests
      shell: bash
      run: |
        basedir=$(pwd)
        failed='false'
        # Iterate over Go modules (one go.mod per module) instead of every
        # *_test.go file. The previous implementation ran `go test` once per
        # test file in the enclosing directory without specifying a package,
        # producing N*M duplicate runs for a package with N test files and M
        # build tags. Iterating over go.mod files runs each module exactly
        # once per build tag, and `./...` covers every package inside.
        for gomod in $(find images -type f -name 'go.mod'); do
          dir=$(dirname "$gomod")
          cd "$basedir/$dir" || continue
          # check all editions
          for edition in $GO_BUILD_TAGS; do
            echo "Running tests in $dir (edition: $edition)"
            go test -v -tags "$edition" ./...
            if [ $? -ne 0 ]; then
              echo "Tests failed in $dir (edition: $edition)"
              failed='true'
            fi
          done
          cd "$basedir" || exit 1
        done
        if [ "$failed" = 'true' ]; then
          exit 1
        fi
